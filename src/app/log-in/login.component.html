<div class="login-page">
  <div class="login-card">
    <div class="card-header">
      <img src="assets/liceo-logo.png" alt="Liceo Logo" class="logo" />
      <h1 class="university-title">LICEO DE CAGAYAN<br />UNIVERSITY</h1>
    </div>

    <p class="sign-in-title">SIGN IN YOUR ACCOUNT</p>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
      <input
        type="email"
        placeholder="@liceo.edu.ph"
        formControlName="email"
        class="form-input"
        autocomplete="email"
      />

      <input
        type="password"
        placeholder="Password"
        formControlName="password"
        class="form-input"
        autocomplete="current-password"
      />

      <div class="row-actions">
        <button type="submit" class="login-button" [disabled]="!loginForm.valid">LOGIN</button>
        <button type="button" (click)="onCreateAccount()" class="create-account-button">create an account</button>
      </div>

      <a class="forgot-password" routerLink="/forgot-password">Forgot password?</a>
    </form>

    <h2 class="app-title">CAMPUS EVENT<br />FINDER</h2>
  </div>
</div>
