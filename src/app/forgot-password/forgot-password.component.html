<div class="forgot-page">
  <div class="forgot-card">
    <div class="card-header">
      <img src="assets/liceo-logo.png" alt="Liceo Logo" class="logo" />
      <h1 class="university-title">LICEO DE CAGAYAN<br />UNIVERSITY</h1>
    </div>

    <p class="title">FORGOT PASSWORD</p>

    <form
      [formGroup]="requestForm"
      (ngSubmit)="onSubmitRequest()"
      class="forgot-form"
      *ngIf="phase === 'request'"
    >
      <input
        type="email"
        placeholder="@liceo.edu.ph"
        formControlName="email"
        class="form-input"
        autocomplete="email"
      />

      <button type="submit" class="primary-btn" [disabled]="requestForm.invalid">SEND RESET LINK</button>
      <button type="button" class="text-btn" (click)="backToLogin()">Back to log in</button>
    </form>

    <div class="success" *ngIf="phase === 'done'">
      <p>{{ message }}</p>
      <button type="button" class="primary-btn" (click)="backToLogin()">Back to log in</button>
    </div>
  </div>
</div>
