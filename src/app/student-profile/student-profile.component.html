<div class="profile-page" [style.background-image]="'url(' + backgroundImage + ')'">
  <header class="profile-header">
    <div class="brand">
      <img [src]="logoImage" alt="Liceo logo" class="brand-logo" />
      <div class="brand-text">
        <span>LICEO</span>
        <span>EVENT HUB</span>
      </div>
    </div>

    <div class="header-icons">
      <button type="button" (click)="goHome()" aria-label="Home">
        <span aria-hidden="true">&#8962;</span>
      </button>
      <button type="button" (click)="openMessages()" aria-label="Messages">
        <span aria-hidden="true">&#128172;</span>
      </button>
      <button type="button" (click)="openNotifications()" aria-label="Notifications">
        <span aria-hidden="true">&#128276;</span>
      </button>
      <button type="button" (click)="openSettings()" aria-label="Settings">
        <span aria-hidden="true">&#9881;</span>
      </button>
    </div>
  </header>

  <section class="profile-card" aria-label="Student profile card">
    <img [src]="profileImage" alt="Student profile image" class="avatar" />
    <h1>Student profile</h1>

    <div class="profile-details" *ngIf="currentUser">
      <p class="detail">{{ currentUser.department }}</p>
      <p class="detail">{{ currentUser.email }}</p>
      <p class="detail">{{ currentUser.id }}</p>
    </div>
  </section>
</div>
